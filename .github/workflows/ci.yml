name: CI

on:
  push:
    branches: [main, code-cleanup]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q --tb=short

  e2e:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          HA_URL: http://localhost:8123

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: python -m py_compile custom_components/mzkzg_transport/*.py

      - name: Check JS syntax
        run: node -c custom_components/mzkzg_transport/www/mzkzg-transport-card.js

  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          python3 << 'EOF'
          import json
          m=json.load(open('custom_components/mzkzg_transport/manifest.json'))
          assert 'version' in m
          assert 'domain' in m
          print(f'OK: {m["domain"]} v{m["version"]}')
          EOF

      - name: Validate translations
        run: |
          python3 << 'EOF'
          import json
          en = set(json.load(open('custom_components/mzkzg_transport/translations/en.json')).keys())
          pl = set(json.load(open('custom_components/mzkzg_transport/translations/pl.json')).keys())
          assert en == pl, f'Mismatch: {en ^ pl}'
          print('Translations OK')
          EOF

      - name: Validate HACS
        run: |
          python3 << 'EOF'
          import json
          h=json.load(open('hacs.json'))
          assert 'name' in h
          print(f'HACS OK: {h["name"]}')
          EOF
# CI trigger
