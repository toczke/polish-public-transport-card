<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MZKZG Card Preview (bez PLK)</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #16a34a;
      --border: rgba(31, 41, 55, 0.08);
      --primary-color: #005eb8;
      --primary-text-color: #1f2937;
      --secondary-text-color: #6b7280;
      --divider-color: rgba(31, 41, 55, 0.12);
      --card-background-color: #ffffff;
      --ha-card-header-font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    body[data-theme="dark"] {
      --bg: #111827;
      --panel: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255,255,255,0.08);
      --primary-color: #60a5fa;
      --primary-text-color: #e5e7eb;
      --secondary-text-color: #9ca3af;
      --divider-color: rgba(255,255,255,0.1);
      --card-background-color: #1f2937;
    }
    body[data-theme="dark"] .topbar {
      background: rgba(17, 24, 39, 0.94);
    }
    body[data-theme="dark"] .pill {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(59, 130, 246, 0.08);
    }
    .btn {
      cursor: pointer;
      border: 1px solid #bfd0e8;
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
    }
    .btn:hover { background: #f8fafc; }
    body[data-theme="dark"] .btn {
      border-color: #2d3f67;
      background: #14213d;
      color: #e5e7eb;
    }
    body[data-theme="dark"] .btn:hover { background: #1b2d52; }
    .grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .card-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: transparent;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 2px;
      border-bottom: none;
      font-size: 11px;
      color: var(--muted);
      background: transparent;
    }
    .card-head strong { font-weight: 600; color: var(--text); }
    .ok { color: var(--accent); }
    .err { color: #ef4444; }
  </style>
</head>

      if (provider === "kiedyprzyjedzie_pks_starogard") {

          { route: "503", headsign: "Skórcz", estimated_time: addMinutesIso(11), theoretical_time: addMinutesIso(11), realtime: false, delay_seconds: 0, provider },
          { route: "506", headsign: "Czarna Woda", estimated_time: addMinutesIso(28), theoretical_time: addMinutesIso(28), realtime: false, delay_seconds: 0, provider },
        ];
      }
      if (provider === "kiedyprzyjedzie_bytow") {
        return [
          { route: "1", headsign: "Dworcowa", estimated_time: addMinutesIso(3, 120), theoretical_time: addMinutesIso(1), realtime: true, delay_seconds: 120, bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider },
          { route: "2", headsign: "Miastko", estimated_time: addMinutesIso(11), theoretical_time: addMinutesIso(11), realtime: false, delay_seconds: 0, provider },

      if (provider === "kiedyprzyjedzie_czluchow") {

          { route: "10", headsign: "Plac", estimated_time: addMinutesIso(3, 120), theoretical_time: addMinutesIso(1), realtime: true, delay_seconds: 120, bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider },
          { route: "11", headsign: "Człuchów, Zamek", estimated_time: addMinutesIso(11), theoretical_time: addMinutesIso(11), realtime: false, delay_seconds: 0, provider },
          { route: "12", headsign: "Rzewnica", estimated_time: addMinutesIso(27), theoretical_time: addMinutesIso(27), realtime: false, delay_seconds: 0, provider },

      }
      if (provider === "zkm_gdynia") {
        return [
          { route: "21", headsign: "Dworzec Główny", estimated_time: addMinutesIso(1, 60), theoretical_time: addMinutesIso(0), realtime: true, delay_seconds: 60, vehicle_code: "2758", bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, provider },

    }

    function buildHass() {
      const states = {};
      for (const p of PROVIDERS) {
        const entity = `sensor.preview_${p.key}`;
        const deps = departuresFor(p.key);
        states[entity] = {
          state: deps[0]?.estimated_time ?? "unknown",
          last_updated: new Date().toISOString(),
          attributes: {
            provider: p.key,
            stop_name: p.stop,
            last_update: new Date().toISOString(),
            departures: deps,
          }
        };
      }
      return {
        states,
        callService: async (...args) => console.debug("callService", args),
      };
    }

    async function loadCardScript() {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = `../custom_components/mzkzg_transport/www/mzkzg-transport-card.js?v=${Date.now()}`;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function renderCards() {
      const grid = document.getElementById("grid");
      const hass = buildHass();
      grid.innerHTML = "";
      for (const p of PROVIDERS) {
        const wrap = document.createElement("section");
        wrap.className = "card-wrap";
        wrap.innerHTML = `<div class="card-head"><span style="display:inline-flex;align-items:center;gap:6px;"><ha-icon icon="${p.icon}" style="color:var(--accent)"></ha-icon><strong>${p.label}</strong></span><span class="ok">${p.key}</span></div>`;

        const card = document.createElement("mzkzg-transport-card");
        card.setConfig({
          type: "custom:mzkzg-transport-card",
          entities: [`sensor.preview_${p.key}`],
          max_departures: 6,
          show_footer: true,
          show_delays: true,
          show_bike: true,
          show_wheelchair: true,
          show_ac: true,
          show_ticket_machine: true,
          display_preset: "standard",
          tap_action: { action: "none" },
          hold_action: { action: "none" },
          double_tap_action: { action: "none" },
        });
        card.hass = hass;
        wrap.appendChild(card);
        grid.appendChild(wrap);
      }
    }

    function setupAutoReload() {
      const auto = document.getElementById("autoReload");
      const status = document.getElementById("status");
      const reloadNow = document.getElementById("reloadNow");
      const themeToggle = document.getElementById("themeToggle");
      reloadNow.addEventListener("click", () => location.reload());
      const savedTheme = localStorage.getItem("preview-theme") || "light";
      document.body.dataset.theme = savedTheme;
      themeToggle.textContent = `Theme: ${savedTheme}`;
      themeToggle.addEventListener("click", () => {
        const next = document.body.dataset.theme === "dark" ? "light" : "dark";
        document.body.dataset.theme = next;
        localStorage.setItem("preview-theme", next);
        themeToggle.textContent = `Theme: ${next}`;
      });
      setInterval(() => {
        const s = 60;
        status.textContent = auto.checked ? `Auto reload: ${s}s` : "Auto reload: off";
        if (!auto.checked) return;
        const t = Number(sessionStorage.getItem("preview_next_reload") || "0");
        const now = Date.now();
        if (!t || now >= t) {
          sessionStorage.setItem("preview_next_reload", String(now + s * 1000));
          location.reload();
        }
      }, 500);
    }

    (async () => {
      const status = document.getElementById("status");
      try {
        await loadCardScript();
        renderCards();
        setupAutoReload();
        status.className = "pill ok";
        status.textContent = "Załadowano kartę";
      } catch (e) {
        console.error(e);
        status.className = "pill err";
        status.textContent = "Błąd ładowania JS";
      }
    })();
  </script>
