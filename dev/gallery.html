<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MZKZG Card Gallery</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #16a34a;
      --border: rgba(31, 41, 55, 0.08);
      --primary-color: #005eb8;
      --primary-text-color: #1f2937;
      --secondary-text-color: #6b7280;
      --divider-color: rgba(31, 41, 55, 0.12);
      --card-background-color: #ffffff;
      --ha-card-header-font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
    }
    body[data-theme="dark"] {
      --bg: #111827;
      --panel: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255,255,255,0.08);
      --primary-color: #60a5fa;
      --primary-text-color: #e5e7eb;
      --secondary-text-color: #9ca3af;
      --divider-color: rgba(255,255,255,0.1);
      --card-background-color: #1f2937;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    body[data-theme="dark"] .topbar { background: rgba(17,24,39,0.94); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(59, 130, 246, 0.08);
    }
    .btn {
      cursor: pointer;
      border: 1px solid #bfd0e8;
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
    }
    body[data-theme="dark"] .btn {
      border-color: #2d3f67;
      background: #14213d;
      color: #e5e7eb;
    }
    .wrap { padding: 16px; }
    .section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .section-title {
      margin: 20px 0 10px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .card-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 2px;
      font-size: 11px;
      color: var(--muted);
    }
    .card-head strong { color: var(--text); font-weight: 600; }
    .card-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }
    ha-card, mzkzg-transport-card { display: block; }
  </style>
</head>
<body data-theme="light">
  <div class="topbar">
    <span class="pill">Gallery: 6 layout variants</span>
    <span class="pill">Themes: light / dark</span>
    <button class="btn" id="themeToggle">Theme: light</button>
    <button class="btn" id="reloadNow">Reload now</button>
    <span class="pill" id="status"></span>
  </div>
  <div class="wrap">
    <div class="section-title">Visual Matrix</div>
    <div id="section" class="section"></div>
  </div>
  <script>
    if (!customElements.get("ha-card")) customElements.define("ha-card", class extends HTMLElement {});
    if (!customElements.get("ha-icon")) {
      class HaIconPreview extends HTMLElement {
        static get observedAttributes() { return ["icon"]; }
        connectedCallback() { this._render(); }
        attributeChangedCallback() { this._render(); }
        _render() {
          const icon = this.getAttribute("icon") || "mdi:bus";
          const map = {
            "mdi:tram": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19,16.94V8.5C19,5.71 16.39,5.1 13,5L13.75,3.5H17V2H7V3.5H11.75L11,5C7.86,5.11 5,5.73 5,8.5V16.94C5,18.39 6.19,19.6 7.59,19.91L6,21.5V22H8.23L10.23,20H14L16,22H18V21.5L16.5,20H16.42C18.11,20 19,18.63 19,16.94M12,18.5A1.5,1.5 0 0,1 10.5,17A1.5,1.5 0 0,1 12,15.5A1.5,1.5 0 0,1 13.5,17A1.5,1.5 0 0,1 12,18.5M17,14H7V9H17V14Z" /></svg>`,
            "mdi:bus": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18,11H6V6H18M16.5,17A1.5,1.5 0 0,1 15,15.5A1.5,1.5 0 0,1 16.5,14A1.5,1.5 0 0,1 18,15.5A1.5,1.5 0 0,1 16.5,17M7.5,17A1.5,1.5 0 0,1 6,15.5A1.5,1.5 0 0,1 7.5,14A1.5,1.5 0 0,1 9,15.5A1.5,1.5 0 0,1 7.5,17M4,16C4,16.88 4.39,17.67 5,18.22V20A1,1 0 0,0 6,21H7A1,1 0 0,0 8,20V19H16V20A1,1 0 0,0 17,21H18A1,1 0 0,0 19,20V18.22C19.61,17.67 20,16.88 20,16V6C20,2.5 16.42,2 12,2C7.58,2 4,2.5 4,6V16Z" /></svg>`,
            "mdi:bus-clock": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.5,4V8.25L19.36,9.94L18.61,11.16L15,9V4H16.5M16,13C17.36,13 18.54,12.5 19.5,11.53C20.5,10.56 21,9.39 21,8C21,6.64 20.5,5.46 19.5,4.5C18.54,3.5 17.36,3 16,3C14.61,3 13.44,3.5 12.47,4.5C11.5,5.46 11,6.64 11,8C11,9.39 11.5,10.56 12.47,11.53C13.44,12.5 14.61,13 16,13M13.5,19C13.94,19 14.3,18.84 14.58,18.54C14.86,18.24 15,17.89 15,17.5C15,17.08 14.86,16.73 14.58,16.43C14.3,16.13 13.94,16 13.5,16C13.06,16 12.7,16.13 12.42,16.43C12.14,16.73 12,17.08 12,17.5C12,17.89 12.14,18.24 12.42,18.54C12.7,18.84 13.06,19 13.5,19M3,13H11.11C9.7,11.64 9,10 9,8H3V13M4.5,19C4.94,19 5.3,18.84 5.58,18.54C5.86,18.24 6,17.89 6,17.5C6,17.08 5.86,16.73 5.58,16.43C5.3,16.13 4.94,16 4.5,16C4.06,16 3.7,16.13 3.42,16.43C3.14,16.73 3,17.08 3,17.5C3,17.89 3.14,18.24 3.42,18.54C3.7,18.84 4.06,19 4.5,19M16,1C17.92,1 19.58,1.67 20.95,3.05C22.33,4.42 23,6.08 23,8C23,9.77 22.44,11.29 21.28,12.59C20.13,13.88 18.7,14.66 17,14.91V18C17,18.84 16.67,19.58 16,20.2V22C16,22.27 15.89,22.5 15.7,22.71C15.5,22.91 15.28,23 15,23H14C13.73,23 13.5,22.91 13.29,22.71C13.09,22.5 13,22.27 13,22V21H5V22C5,22.27 4.91,22.5 4.71,22.71C4.5,22.91 4.27,23 4,23H3C2.72,23 2.5,22.91 2.3,22.71C2.11,22.5 2,22.27 2,22V20.2C1.33,19.58 1,18.84 1,18V8C1,6.42 1.67,5.35 3.05,4.8C4.42,4.26 6.41,4 9,4C9.13,4 9.33,4 9.61,4C9.89,4 10.09,4.03 10.22,4.03C11.63,2 13.55,1 16,1Z" /></svg>`,
            "mdi:train": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12,2C8,2 4,2.5 4,6V15.5A3.5,3.5 0 0,0 7.5,19L6,20.5V21H8.23L10.23,19H14L16,21H18V20.5L16.5,19A3.5,3.5 0 0,0 20,15.5V6C20,2.5 16.42,2 12,2M7.5,17A1.5,1.5 0 0,1 6,15.5A1.5,1.5 0 0,1 7.5,14A1.5,1.5 0 0,1 9,15.5A1.5,1.5 0 0,1 7.5,17M11,10H6V6H11V10M13,10V6H18V10H13M16.5,17A1.5,1.5 0 0,1 15,15.5A1.5,1.5 0 0,1 16.5,14A1.5,1.5 0 0,1 18,15.5A1.5,1.5 0 0,1 16.5,17Z" /></svg>`,
            "mdi:bus-stop": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M22 7V16C22 16.71 21.62 17.36 21 17.72V19.25C21 19.66 20.66 20 20.25 20H19.75C19.34 20 19 19.66 19 19.25V18H12V19.25C12 19.66 11.66 20 11.25 20H10.75C10.34 20 10 19.66 10 19.25V17.72C9.39 17.36 9 16.71 9 16V7C9 4 12 4 15.5 4S22 4 22 7M13 15C13 14.45 12.55 14 12 14S11 14.45 11 15 11.45 16 12 16 13 15.55 13 15M20 15C20 14.45 19.55 14 19 14S18 14.45 18 15 18.45 16 19 16 20 15.55 20 15M20 7H11V11H20V7M7 9.5C6.97 8.12 5.83 7 4.45 7.05C3.07 7.08 1.97 8.22 2 9.6C2.03 10.77 2.86 11.77 4 12V20H5V12C6.18 11.76 7 10.71 7 9.5Z" /></svg>`,
          };
          this.innerHTML = map[icon] || map["mdi:bus"];
        }
      }
      customElements.define("ha-icon", HaIconPreview);
    }

    const PLACEHOLDER = {
      ztm: "sensor.preview_ztm_gdansk",
      zkm: "sensor.preview_zkm_gdynia",
      albatros: "sensor.preview_kiedyprzyjedzie_albatros",
      pks: "sensor.preview_kiedyprzyjedzie_pks_gdansk",
      tczew: "sensor.preview_time4bus_tczew",
      bytow: "sensor.preview_kiedyprzyjedzie_bytow",
      czluchow: "sensor.preview_kiedyprzyjedzie_czluchow",
    };

    function addMinutesIso(mins, delaySec = 0) {
      return new Date(Date.now() + mins * 60000 + delaySec * 1000).toISOString();
    }

    function departure(route, headsign, mins, delay = 0, extra = {}) {
      return {
        route,
        headsign,
        estimated_time: addMinutesIso(mins, delay),
        theoretical_time: addMinutesIso(mins),
        realtime: delay > 0,
        delay_seconds: delay,
        provider: extra.provider,
        ...extra,
      };
    }

    function providerData() {
      return {
        ztm: [
          departure("154", "Orunia Górna", 2, 120, { vehicle_code: "2538", bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "ztm_gdansk" }),
          departure("132", "Pruszcz Zastawna/Rondo", 7, 0, { provider: "ztm_gdansk" }),
        ],
        zkm: [
          departure("21", "Dworzec Główny", 1, 60, { vehicle_code: "2758", bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, provider: "zkm_gdynia" }),
          departure("147", "Pustki Cisowskie", 9, 0, { provider: "zkm_gdynia" }),
        ],
        albatros: [
          departure("660", "Gdańsk, Hala Olivia", 3, 120, { bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "kiedyprzyjedzie_albatros" }),
          departure("654", "Gdańsk, Łostowice Świętokrzyska", 18, 0, { provider: "kiedyprzyjedzie_albatros" }),
        ],
        pks: [
          departure("854", "Krynica Morska, Dworzec", 3, 120, { bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "kiedyprzyjedzie_pks_gdansk" }),
          departure("820", "Nowy Dwór Gdański", 24, 0, { provider: "kiedyprzyjedzie_pks_gdansk" }),
        ],
        tczew: [
          departure("3", "Czyżykowo", 2, 60, { vehicle_code: "9405", wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "time4bus_tczew" }),
          departure("17", "Dworzec PKP", 10, 0, { provider: "time4bus_tczew" }),
        ],
        bytow: [
          departure("1", "Dworcowa", 3, 120, { bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "kiedyprzyjedzie_bytow" }),
          departure("3", "Północna", 25, 0, { provider: "kiedyprzyjedzie_bytow" }),
        ],
        czluchow: [
          departure("10", "Plac", 3, 120, { bike_allowed: true, wheelchair_accessible: true, air_conditioning: true, ticket_machine: true, provider: "kiedyprzyjedzie_czluchow" }),
          departure("12", "Rzewnica", 27, 0, { provider: "kiedyprzyjedzie_czluchow" }),
        ],
      };
    }

    function makeState(entity, departures, stopName) {
      return {
        state: departures[0]?.estimated_time ?? "unknown",
        last_updated: new Date().toISOString(),
        attributes: {
          provider: departures[0]?.provider,
          stop_name: stopName,
          last_update: new Date().toISOString(),
          departures,
        },
      };
    }

    function buildHass() {
      const p = providerData();
      const states = {
        [PLACEHOLDER.ztm]: makeState(PLACEHOLDER.ztm, p.ztm, "Dworzec Główny 18"),
        [PLACEHOLDER.zkm]: makeState(PLACEHOLDER.zkm, p.zkm, "Gdynia, Dworzec Główny"),
        [PLACEHOLDER.albatros]: makeState(PLACEHOLDER.albatros, p.albatros, "Gdańsk, Dworzec Autobusowy"),
        [PLACEHOLDER.pks]: makeState(PLACEHOLDER.pks, p.pks, "Gdańsk, Dworzec Autobusowy"),
        [PLACEHOLDER.tczew]: makeState(PLACEHOLDER.tczew, p.tczew, "Tczew, Dworzec PKP"),
        [PLACEHOLDER.bytow]: makeState(PLACEHOLDER.bytow, p.bytow, "Bytów, Dworcowa"),
        [PLACEHOLDER.czluchow]: makeState(PLACEHOLDER.czluchow, p.czluchow, "Człuchów, Plac"),
      };
      return { states, callService: async () => {} };
    }

    function variant(entityGroup, displayPreset, viewMode, title, desc, icon) {
      return { entityGroup, displayPreset, viewMode, title, desc, icon };
    }

    const VARIANTS = [
      variant([PLACEHOLDER.ztm], "standard", "mixed", "Standard / Mixed", "ZTM Gdańsk, single entity", "mdi:tram"),
      variant([PLACEHOLDER.ztm, PLACEHOLDER.zkm], "standard", "tabs", "Standard / Tabs", "ZTM + ZKM in tabs", "mdi:bus"),
      variant([PLACEHOLDER.albatros], "compact", "mixed", "Compact / Mixed", "Albatros single entity", "mdi:bus"),
      variant([PLACEHOLDER.pks, PLACEHOLDER.albatros], "compact", "tabs", "Compact / Tabs", "PKS Gdańsk + Albatros", "mdi:bus"),
      variant([PLACEHOLDER.tczew], "e_ink", "mixed", "E-ink / Mixed", "Tczew Time4BUS", "mdi:bus-clock"),
      variant([PLACEHOLDER.bytow, PLACEHOLDER.czluchow], "e_ink", "tabs", "E-ink / Tabs", "Bytów + Człuchów", "mdi:bus"),
    ];

    function loadCardScript() {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = `../custom_components/mzkzg_transport/www/mzkzg-transport-card.js?v=${Date.now()}`;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function render() {
      const hass = buildHass();
      const el = document.getElementById("section");
      el.innerHTML = "";
      for (const v of VARIANTS) {
        const wrap = document.createElement("section");
        wrap.className = "card-wrap";
        wrap.innerHTML = `
          <div class="card-head">
            <span style="display:inline-flex;align-items:center;gap:6px;"><ha-icon icon="${v.icon}" style="color:var(--accent)"></ha-icon><strong>${v.title}</strong></span>
            <span>${v.viewMode}</span>
          </div>
          <div class="card-desc">${v.desc}</div>
        `;
        const card = document.createElement("mzkzg-transport-card");
        card.setConfig({
          type: "custom:mzkzg-transport-card",
          entities: v.entityGroup,
          max_departures: 6,
          show_footer: true,
          show_delays: true,
          show_bike: true,
          show_wheelchair: true,
          show_ac: true,
          show_ticket_machine: true,
          display_preset: v.displayPreset,
          view_mode: v.viewMode,
          tap_action: { action: "none" },
          hold_action: { action: "none" },
          double_tap_action: { action: "none" },
        });
        card.hass = hass;
        wrap.appendChild(card);
        el.appendChild(wrap);
      }
    }

    function setupTheme() {
      const saved = localStorage.getItem("preview-theme") || "light";
      document.body.dataset.theme = saved;
      const btn = document.getElementById("themeToggle");
      btn.textContent = `Theme: ${saved}`;
      btn.addEventListener("click", () => {
        const next = document.body.dataset.theme === "dark" ? "light" : "dark";
        document.body.dataset.theme = next;
        localStorage.setItem("preview-theme", next);
        btn.textContent = `Theme: ${next}`;
      });
    }

    (async () => {
      const status = document.getElementById("status");
      try {
        await loadCardScript();
        setupTheme();
        render();
        document.getElementById("reloadNow").addEventListener("click", () => location.reload());
        status.textContent = "Loaded";
      } catch (e) {
        console.error(e);
        status.textContent = "Failed";
      }
    })();
  </script>
</body>
</html>
